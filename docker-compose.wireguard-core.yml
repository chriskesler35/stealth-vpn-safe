services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: relay-wireguard-core
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
    volumes:
      - ./wireguard-core:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.src_valid_mark: 1

  caddy:
    image: caddy:2.8
    container_name: relay-caddy-core
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      PUBLIC_HOST: ${PUBLIC_HOST}
      HOME_ASSISTANT_UPSTREAM: ${HOME_ASSISTANT_UPSTREAM}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
